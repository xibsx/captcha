<!DOCTYPE html>
<html>
<head>
    <title>FREEXIBS CAPTCHA Demo</title>
    <style>
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .demo-form {
            background: #1a1a2a;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            border: 1px solid #333;
        }
        h2 {
            color: #00ff66;
            text-align: center;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #00ff66;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid #00ff66;
            color: #00ff66;
            font-size: 18px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .submit-btn:hover:not(:disabled) {
            background: #00ff66;
            color: black;
        }
        .submit-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .note {
            color: #666;
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="demo-form">
        <h2>⚡ FREEXIBS DEMO ⚡</h2>
        
        <form id="demoForm">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <input type="text" placeholder="Message" required>
            
            <!-- ONE LINE - That's it! -->
            <xibs></xibs>
            
            <button type="submit" class="submit-btn" id="submitBtn">SEND MESSAGE</button>
        </form>
        
        <div class="note">
            Just add &lt;xibs&gt;&lt;/xibs&gt; - That's all!
        </div>
    </div>

    <!-- ONE SCRIPT - Loads from your server -->
    <script src="https://captcha.xibs.space/xibs.js"></script>
    <!-- Change to your Heroku URL when deployed -->
    <!-- <script src="https://your-app.herokuapp.com/xibs.js"></script> -->
</body>
</html>
